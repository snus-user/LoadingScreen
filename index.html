<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#0b0f19" />
  <title>Загрузка…</title>
  <link rel="preload" href="styles.css" as="style" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="stage" aria-live="polite">
    <div class="bg" aria-hidden="true">
      <div class="orb orb--a"></div>
      <div class="orb orb--b"></div>
      <div class="orb orb--c"></div>
      <div class="grain"></div>
    </div>

    <section class="card" role="status" aria-label="Загрузка">
      <header class="brand">
        <div class="mark" aria-hidden="true">
          <div class="ring"></div>
          <div class="ring ring--2"></div>
          <div class="spark"></div>
        </div>
        <div class="titles">
          <h1 class="title">prj1</h1>
          <p class="subtitle">Готовим всё к старту</p>
        </div>
      </header>

      <div class="progress" aria-label="Прогресс">
        <div class="progress__bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
          <div class="progress__fill"></div>
        </div>
        <div class="progress__meta">
          <span class="progress__text">Инициализация…</span>
          <span class="progress__percent">0%</span>
        </div>
      </div>

      <div class="dots" aria-hidden="true">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>

      <footer class="hint">
        <span class="hint__kbd">Esc</span>
        <span class="hint__text">— остановить анимацию</span>
      </footer>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
